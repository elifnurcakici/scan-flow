services:
  postgres:
    image: postgres:16
    container_name: scanflow-postgres
    restart: always
    environment:
      POSTGRES_DB: scanflow_db
      POSTGRES_USER: scanflow_user
      POSTGRES_PASSWORD: 843038
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scanflow_user -d scanflow_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: scanflow-redis
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: scanflow-zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: scanflow-kafka
    depends_on:
      - zookeeper
    restart: always
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: scanflow-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: always
    ports:
      - "5092:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=scanflow_db;Username=scanflow_user;Password=843038
      Redis__ConnectionString: redis:6379
      Kafka__BootstrapServers: kafka:29092
      Kafka__ScanCreatedTopic: scan-created
      Kafka__ScanResultTopic: scan-results
      Jwt__Key: THIS_IS_A_SUPER_SECRET_KEY_FOR_TEST_123456
      Jwt__Issuer: ScanFlow
      Jwt__Audience: ScanFlowUsers
    healthcheck:
      test: ["CMD-SHELL", "dotnet --info >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  scanner-service:
    build:
      context: ./scanner-service
    container_name: scanflow-scanner
    depends_on:
      kafka:
        condition: service_healthy
    restart: always
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_CONSUME_TOPIC: scan-created
      KAFKA_PRODUCE_TOPIC: scan-results
      SCANNER_DB_DSN: host=postgres port=5432 user=scanflow_user password=843038 dbname=scanflow_db sslmode=disable

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:5092
    container_name: scanflow-frontend
    depends_on:
      - backend
    restart: always
    ports:
      - "5173:80"

volumes:
  postgres_data:
